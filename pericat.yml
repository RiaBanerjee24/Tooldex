pericat: "0.1.0"                  # REQUIRED

metadata:                           # REQUIRED
  name: "My Agent System"           # REQUIRED
  description: "Example pericat.yml — edit this to match your agents"  # OPTIONAL
  owner: "your-team"                # OPTIONAL
  updated: "2026-03-09"             # OPTIONAL

# Policy engines — declare what enforces your agent permissions.
# Pericat reads these for display only. It does NOT query them at runtime.
# Remove this section entirely if you have no external policy engine.
policy_engines:                     # OPTIONAL (entire section)
  - id: main-policy                 # REQUIRED
    engine: opa                     # REQUIRED — free label: opa, cedar, casbin, custom, etc.
    type: file                      # REQUIRED — "file" | "http" | "inline"
    source: ./policy.rego           # REQUIRED — file path or URL
    description: "OPA Rego policy — ABAC enforcement"  # OPTIONAL

# MCP Servers — define once, reference by id in agents below
servers:                            # OPTIONAL (entire section)
  - id: mysql-prod                  # REQUIRED
    name: "MySQL Production"        # REQUIRED
    transport: stdio                # REQUIRED — "stdio" | "sse" | "streamable-http"
    package: "@benborla29/mcp-server-mysql"  # OPTIONAL
    command: npx                    # OPTIONAL
    args: ["-y", "@benborla29/mcp-server-mysql"]  # OPTIONAL (default: [])
    env:                            # OPTIONAL (default: {})
      MYSQL_HOST: "127.0.0.1"
      MYSQL_PORT: "3306"
      MYSQL_USER: "root"
      MYSQL_DB: "your_db"
    description: "Primary MySQL database"  # OPTIONAL

  - id: filesystem-local            # REQUIRED
    name: "Local Filesystem"        # REQUIRED
    transport: stdio                # REQUIRED
    package: "@modelcontextprotocol/server-filesystem"  # OPTIONAL
    command: npx                    # OPTIONAL
    args: ["-y", "@modelcontextprotocol/server-filesystem", "./logs"]  # OPTIONAL
    description: "Sandboxed to ./logs directory"  # OPTIONAL

# Agents
agents:                             # OPTIONAL (entire section, default: [])
  - id: read-agent                  # REQUIRED
    name: "ReadAgent"               # REQUIRED
    description: "Read-only database queries"  # OPTIONAL
    framework: llamaindex           # OPTIONAL
    status: active                  # OPTIONAL — "active" | "inactive" | "deprecated" (default: active)
    owner: "your-team"              # OPTIONAL
    tags: [database, read-only]     # OPTIONAL (default: [])
    background: false               # OPTIONAL (default: false)
    identity:                       # OPTIONAL (default: type: internal)
      type: internal                # REQUIRED if identity is present — "internal" | "oauth2" | "service_account" | "api_key"
      token_lifetime: session       # OPTIONAL
      client_id:                    # OPTIONAL
      scopes: []                    # OPTIONAL (default: [])
      notes:                        # OPTIONAL
    policy_engine: main-policy      # OPTIONAL — ref to policy_engines[].id
    servers:                        # OPTIONAL (default: [])
      - ref: mysql-prod             # REQUIRED if server entry is present — must match servers[].id
        tools:                      # OPTIONAL (default: [])
          - name: mysql_query       # REQUIRED if tool entry is present
            risk: medium            # OPTIONAL — "low" | "medium" | "high" | "critical"
            permissions:            # OPTIONAL (default: [])
              - operations: [SELECT]  # REQUIRED if permission entry is present
                on: "*"             # OPTIONAL (default: "*")
                access: allowed     # REQUIRED if permission entry is present — "allowed" | "denied"

  - id: write-agent                 # REQUIRED
    name: "WriteAgent"              # REQUIRED
    description: "Restricted writes — INSERT/UPDATE on api_eagluser only"  # OPTIONAL
    framework: llamaindex           # OPTIONAL
    status: active                  # OPTIONAL
    owner: "your-team"              # OPTIONAL
    tags: [database, write-restricted]  # OPTIONAL
    identity:                       # OPTIONAL
      type: internal                # REQUIRED if identity is present
      token_lifetime: session       # OPTIONAL
    policy_engine: main-policy      # OPTIONAL
    servers:                        # OPTIONAL
      - ref: mysql-prod             # REQUIRED if server entry is present
        tools:                      # OPTIONAL
          - name: mysql_query       # REQUIRED if tool entry is present
            risk: high              # OPTIONAL
            permissions:            # OPTIONAL
              - operations: [SELECT]
                on: "*"
                access: allowed     # REQUIRED if permission entry is present
              - operations: [INSERT, UPDATE]
                on: api_eagluser
                access: allowed     # REQUIRED if permission entry is present
              - operations: [DELETE, DROP, ALTER]
                on: "*"
                access: denied      # REQUIRED if permission entry is present
                denied_by: "destructive ops not permitted"  # OPTIONAL

  - id: file-agent                  # REQUIRED
    name: "FileAgent"               # REQUIRED
    description: "Filesystem ops in ./logs — no deletes"  # OPTIONAL
    framework: llamaindex           # OPTIONAL
    status: active                  # OPTIONAL
    owner: "your-team"              # OPTIONAL
    tags: [filesystem, background-worker]  # OPTIONAL
    background: true                # OPTIONAL (default: false)
    identity:                       # OPTIONAL
      type: internal                # REQUIRED if identity is present
      token_lifetime: session       # OPTIONAL
    policy_engine: main-policy      # OPTIONAL
    servers:                        # OPTIONAL
      - ref: filesystem-local       # REQUIRED if server entry is present
        tools:                      # OPTIONAL
          - { name: read_file,           risk: low,      access: allowed }   # name REQUIRED, rest OPTIONAL
          - { name: read_multiple_files, risk: low,      access: allowed }
          - { name: write_file,          risk: medium,   access: allowed }
          - { name: edit_file,           risk: medium,   access: allowed }
          - { name: list_directory,      risk: low,      access: allowed }
          - { name: delete_file,         risk: critical, access: denied, denied_by: "no deletes" }
    file_access:                    # OPTIONAL (default: [])
      - path: "./logs/**"           # REQUIRED if file_access entry is present
        permission: read/write      # REQUIRED if file_access entry is present — "read" | "write" | "read/write" | "denied"
        note: "Sandboxed to logs directory"  # OPTIONAL

  - id: router-agent                # REQUIRED
    name: "RouterAgent"             # REQUIRED
    description: "LLM query router — no tool access"  # OPTIONAL
    framework: llamaindex           # OPTIONAL
    status: active                  # OPTIONAL
    owner: "your-team"              # OPTIONAL
    tags: [orchestrator]            # OPTIONAL
    identity:                       # OPTIONAL
      type: internal                # REQUIRED if identity is present
      token_lifetime: session       # OPTIONAL
    servers: []                     # OPTIONAL

observatory:                        # OPTIONAL (entire section)
  audit_log: ./logs/audit.log       # OPTIONAL (default: ./logs/audit.log)
  changes_log: ./logs/changes.txt   # OPTIONAL (default: ./logs/changes.txt)
